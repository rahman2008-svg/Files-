workflows:
  android-release:
    name: Android Release AAB (Fixed Signing)

    max_build_duration: 120

    environment:
      java: 17

      # ✅ THIS MUST MATCH YOUR UPLOADED KEYSTORE IN CODEMAGIC UI
      android_signing:
        - keystore_reference

      vars:
        PACKAGE_NAME: "com.aistudio.files.go.kxmpzq"

    scripts:

      - name: Checkout source
        script: |
          git checkout .

      - name: Set up Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant permission to Gradle
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease --stacktrace --no-daemon

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
