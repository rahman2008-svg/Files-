workflows:
  android-release:
    name: Android Release

    instance_type: mac_mini_m2

    environment:
      vars:
        GRADLE_OPTS: "-Xmx4g"

    scripts:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew bundleRelease -x signReleaseBundle

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
