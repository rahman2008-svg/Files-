workflows:
  android-release:
    name: NexVora Android Release Build
    max_build_duration: 60

    environment:
      java: 17

      groups:
        - android_signing

      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        PACKAGE_TYPE: "AAB"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:

      - name: Checkout
        script: |
          echo "Starting NexVora Build..."

      - name: Set permissions
        script: |
          chmod +x ./gradlew

      - name: Decode Keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/my-upload-key.jks
          echo "Keystore created"
          ls -la /tmp

      - name: Export env variables
        script: |
          export KEYSTORE_PATH=/tmp/my-upload-key.jks
          export STORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          export KEY_PASSWORD=$CM_KEY_ALIAS_PASSWORD

      - name: Clean Project
        script: |
          ./gradlew clean

      - name: Build Release (AAB)
        script: |
          if [ "$PACKAGE_TYPE" = "AAB" ]; then
            ./gradlew bundleRelease --stacktrace
          else
            ./gradlew assembleRelease --stacktrace
          fi

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk
      - app/build/reports/**

    publishing:
      email:
        recipients:
          - your-email@example.com

      # optional Play Store publish (enable if needed)
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
