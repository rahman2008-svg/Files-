workflows:
  android-release:
    name: Android Release AAB (SAFE BUILD FIX)

    max_build_duration: 120

    environment:
      java: 17

    scripts:

      - name: Checkout code
        script: |
          git checkout .

      - name: Setup Android SDK
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Release AAB (NO SIGNING)
        script: |
          ./gradlew bundleRelease --stacktrace --no-daemon

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk
