workflows:
  android-release:
    name: Files Signed APK Build

    environment:
      java: 17
      android_signing:
        - keystore_reference

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Clean project
        script: ./gradlew clean

      - name: Build Release APK
        script: ./gradlew assembleRelease --stacktrace

    artifacts:
      - app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
