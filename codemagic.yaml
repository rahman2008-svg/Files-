workflows:
  android-build:
    name: Files Working APK Build

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew assembleDebug --stacktrace

      # Debug: দেখবে APK কোথায় তৈরি হচ্ছে
      - find . -name "*.apk"

    artifacts:
      - "**/*.apk"
