workflows:
  android-apk:
    name: Full Working APK Build

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Grant permission
        script: chmod +x gradlew

      - name: Clean project
        script: ./gradlew clean

      - name: Build APK
        script: ./gradlew assembleDebug --stacktrace

      - name: Show APK location
        script: find . -name "*.apk"

    artifacts:
      - "**/*.apk"
