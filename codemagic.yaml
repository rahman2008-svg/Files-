workflows:
  android-release:
    name: Files APK Build

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew assembleDebug --stacktrace

    artifacts:
      - "**/*.apk"
