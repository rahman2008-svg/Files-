workflows:
  android-release:
    name: Files Production APK

    environment:
      java: 17
      android_signing:
        - keystore_reference

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew assembleRelease --stacktrace

    artifacts:
      - app/build/outputs/apk/release/app-release.apk
