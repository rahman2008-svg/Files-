workflows:
  files-release:

    name: Files Release AAB

    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew bundleRelease -x signReleaseBundle

    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - app/build/outputs/apk/**/*.apk
